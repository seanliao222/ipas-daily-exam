name: 每日出題 Daily Exam

on:
  schedule:
    # 每天 00:00 UTC = 台灣時間 08:00
    - cron: '0 0 * * *'
  # 允許手動觸發（測試用）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate today's exam
        run: python generate.py

      - name: Commit & push index.html
        run: |
          git config user.name  "iPAS Daily Bot"
          git config user.email "bot@ipas-daily.noreply"
          git add index.html
          git diff --cached --quiet || git commit -m "📚 每日出題 $(TZ='Asia/Taipei' date +'%Y-%m-%d')"
          git push
